# @package _global_
#
# Joint LM + EM interactive segmentation fine-tuning for SAM2.1 HieraT.
#
# Datasets (all from the UniSAM2 generalist training set):
#   LM 2D:  LIVECell, CellPose, CVZ-Fluo, DSB, DeepBacs, OrgaSegment, OrganoidNet, Omnipose
#   LM 2D+: TissueNet, AxonDeepSeg, CTC
#   LM 3D:  EmbedSeg, NIS3D, PlantSeg (root + ovules)
#   EM 3D:  CREMI, SNEMI, EMNeuron, Platynereis
#
# Data module: micro_sam.v2.datasets.raw_dataset
# Every VOSDataset is wrapped in RepeatFactorWrapper so that fractional and
# integer multipliers both take effect (stochastic rounding for fractions).
# Effective group split per epoch: ~38% LM 2D / ~22% LM 2D+ / ~23% LM 3D / ~18% EM 3D
#
# Changes vs. B+ config:
#   - Hiera-T backbone (embed_dim 96, stages [1,2,7,2], backbone_channel_list [768,384,192,96])
#   - batch_size 2 per GPU → effective batch 8 on 4 GPUs
#   - base_lr / vision_lr scaled by sqrt(4) = 2× for the larger effective batch
#   - LR warmup: linear 1e-8 → peak over first 5% of training, then cosine decay
#   - save_freq 5 (checkpoint every 5 epochs)
#   - compile_image_encoder: False (Hiera-T does not support torch.compile)

scratch:
  resolution: 1024
  train_batch_size: 2
  num_train_workers: 10
  num_frames: 8
  max_num_objects: 2
  base_lr: 1.0e-5
  vision_lr: 6.0e-6
  phases_per_epoch: 1
  num_epochs: 100

# Video transforms (applied consistently across frames within a video/volume)
vos:
  train_transforms:
    - _target_: training.dataset.transforms.ComposeAPI
      transforms:
        - _target_: training.dataset.transforms.RandomHorizontalFlip
          consistent_transform: True
        - _target_: training.dataset.transforms.RandomAffine
          degrees: 25
          shear: 20
          image_interpolation: bilinear
          consistent_transform: True
        - _target_: training.dataset.transforms.RandomResizeAPI
          sizes: ${scratch.resolution}
          square: true
          consistent_transform: True
        - _target_: training.dataset.transforms.ColorJitter
          consistent_transform: True
          brightness: 0.1
          contrast: 0.03
          saturation: 0.03
          hue: null
        - _target_: training.dataset.transforms.RandomGrayscale
          p: 0.05
          consistent_transform: True
        - _target_: training.dataset.transforms.ColorJitter
          consistent_transform: False
          brightness: 0.1
          contrast: 0.05
          saturation: 0.05
          hue: null
        - _target_: training.dataset.transforms.ToTensorAPI
        - _target_: training.dataset.transforms.NormalizeAPI
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]

trainer:
  _target_: training.trainer.Trainer
  mode: train_only
  max_epochs: ${times:${scratch.num_epochs},${scratch.phases_per_epoch}}
  accelerator: cuda
  seed_value: 123

  model:
    _target_: training.model.sam2.SAM2Train
    image_encoder:
      _target_: sam2.modeling.backbones.image_encoder.ImageEncoder
      scalp: 1
      trunk:
        _target_: sam2.modeling.backbones.hieradet.Hiera
        embed_dim: 96
        num_heads: 1
        stages: [1, 2, 7, 2]
        global_att_blocks: [5, 7, 9]
        window_pos_embed_bkg_spatial_size: [7, 7]
      neck:
        _target_: sam2.modeling.backbones.image_encoder.FpnNeck
        position_encoding:
          _target_: sam2.modeling.position_encoding.PositionEmbeddingSine
          num_pos_feats: 256
          normalize: true
          scale: null
          temperature: 10000
        d_model: 256
        backbone_channel_list: [768, 384, 192, 96]
        fpn_top_down_levels: [2, 3]
        fpn_interp_model: nearest

    memory_attention:
      _target_: sam2.modeling.memory_attention.MemoryAttention
      d_model: 256
      pos_enc_at_input: true
      layer:
        _target_: sam2.modeling.memory_attention.MemoryAttentionLayer
        activation: relu
        dim_feedforward: 2048
        dropout: 0.1
        pos_enc_at_attn: false
        self_attention:
          _target_: sam2.modeling.sam.transformer.RoPEAttention
          rope_theta: 10000.0
          feat_sizes: [64, 64]
          embedding_dim: 256
          num_heads: 1
          downsample_rate: 1
          dropout: 0.1
        d_model: 256
        pos_enc_at_cross_attn_keys: true
        pos_enc_at_cross_attn_queries: false
        cross_attention:
          _target_: sam2.modeling.sam.transformer.RoPEAttention
          rope_theta: 10000.0
          feat_sizes: [64, 64]
          rope_k_repeat: True
          embedding_dim: 256
          num_heads: 1
          downsample_rate: 1
          dropout: 0.1
          kv_in_dim: 64
      num_layers: 4

    memory_encoder:
      _target_: sam2.modeling.memory_encoder.MemoryEncoder
      out_dim: 64
      position_encoding:
        _target_: sam2.modeling.position_encoding.PositionEmbeddingSine
        num_pos_feats: 64
        normalize: true
        scale: null
        temperature: 10000
      mask_downsampler:
        _target_: sam2.modeling.memory_encoder.MaskDownSampler
        kernel_size: 3
        stride: 2
        padding: 1
      fuser:
        _target_: sam2.modeling.memory_encoder.Fuser
        layer:
          _target_: sam2.modeling.memory_encoder.CXBlock
          dim: 256
          kernel_size: 7
          padding: 3
          layer_scale_init_value: 1e-6
          use_dwconv: True
        num_layers: 2

    num_maskmem: 7
    image_size: ${scratch.resolution}
    sigmoid_scale_for_mem_enc: 20.0
    sigmoid_bias_for_mem_enc: -10.0
    use_mask_input_as_output_without_sam: true
    directly_add_no_mem_embed: true
    no_obj_embed_spatial: true
    use_high_res_features_in_sam: true
    multimask_output_in_sam: true
    iou_prediction_use_sigmoid: True
    use_obj_ptrs_in_encoder: true
    add_tpos_enc_to_obj_ptrs: true
    proj_tpos_enc_in_obj_ptrs: true
    use_signed_tpos_enc_to_obj_ptrs: true
    only_obj_ptrs_in_the_past_for_eval: true
    pred_obj_scores: true
    pred_obj_scores_mlp: true
    fixed_no_obj_ptr: true
    multimask_output_for_tracking: true
    use_multimask_token_for_obj_ptr: true
    multimask_min_pt_num: 0
    multimask_max_pt_num: 1
    use_mlp_for_obj_ptr_proj: true
    compile_image_encoder: False

    # Training-specific interactive prompting params
    prob_to_use_pt_input_for_train: 0.5
    prob_to_use_pt_input_for_eval: 0.0
    prob_to_use_box_input_for_train: 0.5
    prob_to_use_box_input_for_eval: 0.0
    prob_to_sample_from_gt_for_train: 0.1
    num_frames_to_correct_for_train: 4
    num_frames_to_correct_for_eval: 1
    rand_frames_to_correct_for_train: True
    add_all_frames_to_correct_as_cond: True
    num_init_cond_frames_for_train: 2
    rand_init_cond_frames_for_train: True
    num_correction_pt_per_frame: 7
    use_act_ckpt_iterative_pt_sampling: false
    num_init_cond_frames_for_eval: 1
    forward_backbone_per_frame_for_eval: True

  data:
    train:
      _target_: training.dataset.sam2_datasets.TorchTrainMixedDataset
      phases_per_epoch: ${scratch.phases_per_epoch}
      batch_sizes:
        - ${scratch.train_batch_size}
      datasets:

        # LM 2D

        # LIVECell (~3 253 train images; fractional mult → ~976 samples/epoch)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/livecell
              dataset_name: livecell
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 0.3

        # CellPose (~540 images)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/cellpose
              dataset_name: cellpose
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 2

        # CVZ Fluo (~210 images, cell + DAPI stains)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/cvz
              dataset_name: cvz_fluo
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 4

        # DSB (~497 images)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/dsb
              dataset_name: dsb
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 3

        # DeepBacs (~125 images, mixed bacteria types)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/deepbacs
              dataset_name: deepbacs
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 5

        # OrgaSegment (~184 images)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/orgasegment
              dataset_name: orgasegment
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 4

        # OrganoidNet (~713 images)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/organoidnet
              dataset_name: organoidnet
              split: Training
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 2

        # Omnipose (~500 images, mixed modalities)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.ImageRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/omnipose
              dataset_name: omnipose
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 3

        # LM 3D

        # EmbedSeg (~121 volumes, 4 fluorescence LM datasets)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/embedseg
              dataset_name: embedseg
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 11

        # NIS3D — Drosophila light-sheet (~6 volumes)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/nis3d
              dataset_name: nis3d
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 228

        # PlantSeg root (~21 volumes, confocal cell segmentation)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/plantseg
              dataset_name: plantseg_root
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 65

        # PlantSeg ovules (~22 volumes, confocal cell segmentation)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/plantseg
              dataset_name: plantseg_ovules
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 62

        # EM 3D

        # CREMI (3 vEM volumes, A+B for training)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/cremi
              dataset_name: cremi
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 25

        # SNEMI (1 vEM volume, first 70 slices)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/snemi
              dataset_name: snemi
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 25

        # EMNeuron (76 vEM blocks of (50, 512, 512), ~10 source volumes)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/emneuron
              dataset_name: emneuron
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 50

        # Platynereis cell segmentation (6 training vEM volumes, ~20nm isotropic)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.VolumeRawDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/platynereis
              dataset_name: platynereis
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 25

        # LM 2D+

        # TissueNet (~2 580 zarr files; fractional mult → ~1 290 samples/epoch)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.TissueNetDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/tissuenet
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 0.5

        # AxonDeepSeg SEM (~133 h5 files; CC-derived axon instances)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.AxonDeepSegDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/axondeepseg
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: 1
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 14

        # CTC (8 datasets × 2 sequences = 13 temporal sequences after min-frames filter)
        - _target_: training.dataset.utils.RepeatFactorWrapper
          dataset:
            _target_: training.dataset.vos_dataset.VOSDataset
            transforms: ${vos.train_transforms}
            training: true
            video_dataset:
              _target_: micro_sam.v2.datasets.raw_dataset.CTCDataset
              path: /mnt/vast-nhr/projects/cidas/cca/data/ctc
              split: train
            sampler:
              _target_: training.dataset.vos_sampler.RandomUniformSampler
              num_frames: ${scratch.num_frames}
              max_num_objects: ${scratch.max_num_objects}
            multiplier: 140

      shuffle: True
      num_workers: ${scratch.num_train_workers}
      pin_memory: True
      drop_last: True
      collate_fn:
        _target_: training.utils.data_utils.collate_fn
        _partial_: true
        dict_key: all

  optim:
    amp:
      enabled: True
      amp_dtype: bfloat16

    optimizer:
      _target_: torch.optim.AdamW

    gradient_clip:
      _target_: training.optimizer.GradientClipper
      max_norm: 0.1
      norm_type: 2

    param_group_modifiers:
      - _target_: training.optimizer.layer_decay_param_modifier
        _partial_: True
        layer_decay_value: 0.9
        apply_to: 'image_encoder.trunk'
        overrides:
          - pattern: '*pos_embed*'
            value: 1.0

    options:
      lr:
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: 1.0e-8
                end_value: ${scratch.base_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${scratch.base_lr}
                end_value: ${divide:${scratch.base_lr},10}
            interval_scaling: [rescaled, rescaled]
            lengths: [0.053, 0.947]
        - scheduler:
            _target_: fvcore.common.param_scheduler.CompositeParamScheduler
            schedulers:
              - _target_: fvcore.common.param_scheduler.LinearParamScheduler
                start_value: 1.0e-8
                end_value: ${scratch.vision_lr}
              - _target_: fvcore.common.param_scheduler.CosineParamScheduler
                start_value: ${scratch.vision_lr}
                end_value: ${divide:${scratch.vision_lr},10}
            interval_scaling: [rescaled, rescaled]
            lengths: [0.053, 0.947]
          param_names:
            - 'image_encoder.*'
      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.1
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.0
          param_names:
            - '*bias*'
          module_cls_names: ['torch.nn.LayerNorm']

  loss:
    all:
      _target_: training.loss_fns.MultiStepMultiMasksAndIous
      weight_dict:
        loss_mask: 20
        loss_dice: 1
        loss_iou: 1
        loss_class: 1
      supervise_all_iou: true
      iou_use_l1_loss: true
      pred_obj_scores: true
      focal_gamma_obj_score: 0.0
      focal_alpha_obj_score: -1.0

  distributed:
    backend: nccl
    find_unused_parameters: True

  logging:
    tensorboard_writer:
      _target_: training.utils.logger.make_tensorboard_logger
      log_dir: ${launcher.experiment_log_dir}/tensorboard
      flush_secs: 120
      should_log: True
    log_dir: ${launcher.experiment_log_dir}/logs
    log_freq: 10

  checkpoint:
    save_dir: ${launcher.experiment_log_dir}/checkpoints
    save_freq: 5
    model_weight_initializer:
      _partial_: True
      _target_: training.utils.checkpoint_utils.load_state_dict_into_model
      strict: True
      ignore_unexpected_keys: null
      ignore_missing_keys: null
      state_dict:
        _target_: training.utils.checkpoint_utils.load_checkpoint_and_apply_kernels
        checkpoint_path: /mnt/vast-nhr/home/archit/u12090/segment-anything-2/checkpoints/sam2.1_hiera_tiny.pt
        ckpt_state_dict_keys: ['model']

launcher:
  num_nodes: 1
  gpus_per_node: 4
  experiment_log_dir: /mnt/vast-nhr/projects/cidas/cca/models/micro_sam2/interactive/v1

submitit:
  partition: null
  account: null
  qos: null
  cpus_per_task: 10
  use_cluster: false
  timeout_hour: 24
  name: null
  port_range: [10000, 65000]
